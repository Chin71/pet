<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拯救心愛的寵物大作戰</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        #game-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #ff6b6b; }
        .hidden { display: none; }
        .btn {
            background-color: #4ecdc4;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn:hover { background-color: #45b7d1; }
        .btn-option {
            display: block;
            width: 100%;
            margin: 10px 0;
            background-color: #f7f1e3;
            color: #333;
            border: 2px solid #d1ccc0;
        }
        .btn-option:hover { background-color: #d1ccc0; }
        .character-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .char-card {
            border: 2px solid #ccc;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
        }
        .char-card.selected {
            border-color: #ff6b6b;
            background-color: #ffeaea;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #eee;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .monster-area {
            font-size: 60px;
            margin: 20px 0;
        }
        .hp-bar-container {
            width: 100%;
            background-color: #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .hp-bar {
            height: 20px;
            background-color: #ff4757;
            border-radius: 5px;
            width: 100%;
            transition: width 0.3s;
        }
        #feedback { font-weight: bold; margin-bottom: 15px; height: 24px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🛡️ 拯救心愛的寵物大作戰 🐾</h1>
    
    <div id="screen-start">
        <p>你的寵物被壞怪物抓走了！請選擇你的角色，透過回答健康知識問題來擊敗怪物，拯救你的寵物吧！</p>
        
        <h3>人物角色</h3>
        <div class="character-grid">
            <div class="char-card" onclick="selectChar(this, '勇者 🧑‍🎤')">🧑‍🎤 勇者</div>
            <div class="char-card" onclick="selectChar(this, '魔法師 🧙‍♂️')">🧙‍♂️ 魔法師</div>
            <div class="char-card" onclick="selectChar(this, '護衛 💂‍♂️')">💂‍♂️ 護衛</div>
        </div>

        <h3>動物角色</h3>
        <div class="character-grid">
            <div class="char-card" onclick="selectChar(this, '小貓 🐱')">🐱 小貓</div>
            <div class="char-card" onclick="selectChar(this, '小狗 🐶')">🐶 小狗</div>
            <div class="char-card" onclick="selectChar(this, '小兔 🐰')">🐰 小兔</div>
        </div>

        <button class="btn" onclick="startGame()" style="font-size: 20px;">開始遊戲</button>
    </div>

    <div id="screen-battle" class="hidden">
        <div class="status-bar">
            <div id="player-info">角色: <span id="player-char"></span></div>
            <div id="player-lives">❤️ 生命值: 3</div>
            <div id="stage-info">關卡: 1 / 5</div>
        </div>

        <div class="monster-area">
            <div id="monster-emoji">👾</div>
            <div id="monster-name" style="font-size: 20px;">初級怪物</div>
        </div>
        
        <div class="hp-bar-container">
            <div id="monster-hp-bar" class="hp-bar"></div>
        </div>

        <div id="feedback"></div>

        <div id="question-container">
            <h3 id="question-text">題目載入中...</h3>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="screen-end" class="hidden">
        <h2 id="end-title"></h2>
        <p id="end-desc"></p>
        <div style="font-size: 80px;" id="end-emoji"></div>
        <button class="btn" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    // 遊戲狀態變數
    let selectedCharacter = '';
    let lives = 3;
    let currentStage = 0; // 0~4 對應 1~5 關
    let currentMonsterMaxHP = 1;
    let currentMonsterHP = 1;

    // 怪物設定
    const monsters = [
        { name: "初級史萊姆", emoji: "🦠", type: "TF", hp: 1 },
        { name: "初級蝙蝠", emoji: "🦇", type: "TF", hp: 1 },
        { name: "初級哥布林", emoji: "👺", type: "TF", hp: 1 },
        { name: "中級食人花", emoji: "🥀", type: "MCQ", hp: 2 },
        { name: "超級大魔王", emoji: "👹", type: "MCQ", hp: 3 }
    ];

    // 健康知識題庫 (主題：睡眠品質)
    const questionsTF = [
        { q: "睡前喝咖啡或濃茶有助於提高睡眠品質。", options: ["⭕ 是", "❌ 否"], ans: 1 },
        { q: "規律的作息時間可以幫助維持良好的生理時鐘，讓人更容易入睡。", options: ["⭕ 是", "❌ 否"], ans: 0 },
        { q: "睡前在床上滑手機的藍光不會影響大腦分泌褪黑激素。", options: ["⭕ 是", "❌ 否"], ans: 1 },
        { q: "成年人一般建議的健康睡眠時間為7到9小時。", options: ["⭕ 是", "❌ 否"], ans: 0 },
        { q: "如果晚上失眠，白天應該大量補眠才能恢復體力。", options: ["⭕ 是", "❌ 否"], ans: 1 }
    ];

    const questionsMCQ = [
        { q: "下列哪一種環境最適合幫助入睡？", options: ["A. 吵雜且明亮的房間", "B. 安靜、黑暗且溫度適宜的房間", "C. 悶熱且潮濕的環境", "D. 開著電視播放聲音"], ans: 1 },
        { q: "睡前做什麼活動有助於放鬆身心？", options: ["A. 進行高強度的劇烈運動", "B. 看刺激的恐怖電影", "C. 聽輕音樂或進行靜心冥想", "D. 吃豐盛的宵夜大餐"], ans: 2 },
        { q: "如果躺在床上超過20分鐘還睡不著，最好的作法是什麼？", options: ["A. 繼續躺在床上強迫自己睡著", "B. 起床離開臥室，做些溫和放鬆的活動直到有睡意", "C. 拿起手機開始滑社群軟體", "D. 喝一杯濃茶提神"], ans: 1 },
        { q: "下列哪一種飲食習慣可能會破壞夜間的睡眠品質？", options: ["A. 晚餐吃得過飽且油膩", "B. 下午過後避免攝取咖啡因", "C. 睡前喝少許溫熱的牛奶", "D. 晚餐吃七分飽"], ans: 0 },
        { q: "關於午睡，下列哪一個觀念是正確的？", options: ["A. 午睡時間越久越好", "B. 午睡最好控制在20到30分鐘內", "C. 傍晚五點過後還可以繼續午睡", "D. 午睡可以完全取代晚上的睡眠"], ans: 1 }
    ];

    // 隨機打亂陣列順序
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }
    
    let currentTfQueue = shuffle([...questionsTF]);
    let currentMcqQueue = shuffle([...questionsMCQ]);

    function selectChar(element, charName) {
        document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        selectedCharacter = charName;
    }

    function startGame() {
        if (!selectedCharacter) {
            alert("請先選擇一個角色！");
            return;
        }
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-battle').classList.remove('hidden');
        document.getElementById('player-char').innerText = selectedCharacter;
        loadStage();
    }

    function loadStage() {
        if (currentStage >= 5) {
            endGame(true);
            return;
        }

        const monster = monsters[currentStage];
        currentMonsterMaxHP = monster.hp;
        currentMonsterHP = monster.hp;

        document.getElementById('stage-info').innerText = `關卡: ${currentStage + 1} / 5`;
        document.getElementById('monster-emoji').innerText = monster.emoji;
        document.getElementById('monster-name').innerText = monster.name;
        
        updateHPBar();
        loadQuestion();
    }

    function loadQuestion() {
        const monster = monsters[currentStage];
        let qData;

        if (monster.type === "TF") {
            if (currentTfQueue.length === 0) currentTfQueue = shuffle([...questionsTF]);
            qData = currentTfQueue.pop();
        } else {
            if (currentMcqQueue.length === 0) currentMcqQueue = shuffle([...questionsMCQ]);
            qData = currentMcqQueue.pop();
        }

        document.getElementById('question-text').innerText = qData.q;
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, qData.ans);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, correctIndex) {
        const feedback = document.getElementById('feedback');
        if (selectedIndex === correctIndex) {
            // 答對
            currentMonsterHP--;
            updateHPBar();
            feedback.style.color = "green";
            feedback.innerText = "✨ 答對了！怪物受到傷害！";
            
            setTimeout(() => {
                feedback.innerText = "";
                if (currentMonsterHP <= 0) {
                    currentStage++;
                    loadStage();
                } else {
                    loadQuestion();
                }
            }, 1000);

        } else {
            // 答錯
            lives--;
            document.getElementById('player-lives').innerText = `❤️ 生命值: ${lives}`;
            feedback.style.color = "red";
            feedback.innerText = "💥 答錯了！失去一條生命！";
            
            setTimeout(() => {
                feedback.innerText = "";
                if (lives <= 0) {
                    endGame(false);
                } else {
                    loadQuestion(); // 答錯換一題
                }
            }, 1000);
        }
    }

    function updateHPBar() {
        const percentage = (currentMonsterHP / currentMonsterMaxHP) * 100;
        document.getElementById('monster-hp-bar').style.width = `${percentage}%`;
    }

    function endGame(isWin) {
        document.getElementById('screen-battle').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');

        if (isWin) {
            document.getElementById('end-title').innerText = "🎉 任務完成！ 🎉";
            document.getElementById('end-title').style.color = "#2ecc71";
            document.getElementById('end-desc').innerText = "太棒了！你運用了豐富的健康知識擊敗了所有怪物，成功救回了心愛的寵物！";
            document.getElementById('end-emoji').innerText = "🐶💕🐱";
        } else {
            document.getElementById('end-title').innerText = "💀 任務失敗 💀";
            document.getElementById('end-title').style.color = "#e74c3c";
            document.getElementById('end-desc').innerText = "生命值歸零了...寵物還在怪物手裡，重整旗鼓後再次挑戰吧！";
            document.getElementById('end-emoji').innerText = "👻";
        }
    }
</script>

</body>
</html>
